<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f7fb">
  <title>车队用车结算</title>
  <style>
    :root{
      --bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#7c879e;--line:#e5eaf2;
      --blue:#4f75d6;--blue-soft:#eef3ff;--green:#29a85a;--green-bg:#eefaf2;
      --yellow:#fff1a8;--yellow-card:#fffdf2;--danger:#d94b4b;--shadow:0 2px 10px rgba(28,45,79,.06)
    }
    *{box-sizing:border-box;max-width:100%}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}
    body{overflow-x:hidden}
    button,input,select,textarea{font:inherit}
    button{touch-action:manipulation}
    .app{width:100%;max-width:560px;margin:0 auto;padding:14px 12px calc(92px + env(safe-area-inset-bottom))}
    .topbar{padding:4px 2px 12px}
    .topbar h1{font-size:20px;line-height:1.25;margin:0;font-weight:800}
    .topbar .sub{font-size:11px;color:var(--muted);margin-top:3px}
    .select-panel,.smart-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:var(--shadow)}
    .panel-label{font-size:12px;color:var(--muted);margin-bottom:7px}
    .select-row{display:grid;grid-template-columns:minmax(0,1fr) 42px;gap:8px}
    #teamSelect{width:100%;height:44px;border:2px solid #171717;border-radius:7px;background:#fff;padding:0 36px 0 11px;font-size:15px;color:var(--text);outline:none}
    .add-team{height:44px;border:0;border-radius:9px;background:var(--blue-soft);color:#416cc7;font-size:24px;line-height:1}
    .home-entry{margin-top:14px}
    .smart-card{padding:13px 14px}
    .smart-fields{display:grid;gap:0}
    .smart-field{padding:10px 0 12px;border-bottom:1px solid #edf0f5}
    .smart-field:last-child{border-bottom:0}
    .smart-label{display:flex;align-items:center;gap:5px;font-size:13px;color:#6d778b;margin-bottom:7px}
    .required{color:#e1562a;font-size:18px;line-height:1}
    .smart-field input,.smart-field select,.smart-field textarea{width:100%;border:0;background:transparent;color:var(--text);outline:none;font-size:14px;padding:3px 0;line-height:1.45}
    .smart-field textarea{min-height:54px;resize:vertical}
    .paste-box{width:100%;min-height:135px;margin-top:12px;border:1px solid #d7dde8;border-radius:8px;background:#fff;padding:11px;font-size:13px;line-height:1.55;resize:vertical;outline:none}
    .paste-box:focus{border-color:#7392d8;box-shadow:0 0 0 3px rgba(95,131,216,.10)}
    .smart-error{display:none;margin-top:8px;font-size:12px;color:#b33d3d;line-height:1.45}
    .smart-error.show{display:block}
    .smart-actions{display:flex;justify-content:flex-end;margin-top:10px}
    .upload-btn{height:42px;min-width:108px;border:0;border-radius:10px;background:#ff5c0a;color:#fff;font-weight:800;padding:0 24px}
    .summary{margin-top:12px;display:none}.summary.show{display:block}
    .team-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:4px 2px 9px}
    .team-head h2{font-size:18px;margin:0;overflow-wrap:anywhere}.team-head p{font-size:12px;color:var(--muted);margin:3px 0 0}
    .history-btn{height:34px;border:1px solid #cfd7e5;border-radius:9px;background:#fff;color:#53627e;font-size:12px;font-weight:800;padding:0 12px;white-space:nowrap}
    .pending-box{background:var(--green-bg);border:1px solid #d7f2e0;border-radius:14px;padding:13px 14px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .pending-info{min-width:0}.pending-label{font-size:12px;color:#5b8068}.pending-amount{font-size:28px;line-height:1.2;font-weight:800;color:var(--green);margin-top:2px;overflow-wrap:anywhere}
    .settle-all-btn{flex:0 0 auto;height:38px;border:1px solid #97d7aa;border-radius:10px;background:#fff;color:#238447;font-size:13px;font-weight:800;padding:0 14px}.settle-all-btn:disabled{opacity:.45}
    .mini-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:8px}
    .mini{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 8px;min-width:0}.mini .k{font-size:10px;color:var(--muted)}.mini .v{font-size:14px;font-weight:750;margin-top:4px;overflow-wrap:anywhere}
    .section-title{display:flex;align-items:center;justify-content:space-between;margin:16px 2px 9px;gap:8px}.section-title h3{font-size:15px;margin:0}.section-title span{font-size:11px;color:var(--muted);text-align:right}
    .records,.history-list{display:grid;gap:9px}
    .record-card{border:1px solid var(--line);border-radius:13px;background:var(--card);box-shadow:var(--shadow);padding:12px;min-width:0}.record-card.pending{background:var(--yellow-card);border-color:#f2df84}
    .record-top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:start}.record-name{font-size:14px;font-weight:780;color:#111827;line-height:1.4;overflow-wrap:anywhere}.record-date-inline{font-size:12px;color:#111827;font-weight:600;margin-left:6px;white-space:nowrap}
    .status-select{height:31px;border-radius:8px;padding:0 25px 0 9px;font-size:12px;font-weight:700;outline:none}.status-select.pending{background:var(--yellow);border:1px solid #e8cb39;color:#6e5a00}.status-select.settled{background:#fff;border:1px solid #dfe4ed;color:#526073}
    .matter{margin-top:10px;border-top:1px dashed #dde3ed;padding-top:9px}.matter-label,.note-label{font-size:10px;color:var(--muted);margin-bottom:3px}.matter-text{font-size:13px;line-height:1.55;white-space:pre-wrap;overflow-wrap:anywhere}
    .money-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-top:10px}.money-cell{border-radius:9px;background:rgba(255,255,255,.72);border:1px solid #edf0f5;padding:8px 7px;min-width:0}.money-cell .label{font-size:10px;color:var(--muted)}.money-cell .amount{font-size:13px;font-weight:800;margin-top:3px;overflow-wrap:anywhere}.money-cell.price .amount{color:var(--green)}.money-cell.profit .amount.negative{color:var(--danger)}
    .note{margin-top:9px;background:rgba(245,247,251,.8);border-radius:9px;padding:8px 9px}.note-text{font-size:12px;line-height:1.5;white-space:pre-wrap;overflow-wrap:anywhere}.record-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:9px}.text-btn{border:0;background:transparent;padding:5px 4px;font-size:12px;color:#60708c}.text-btn.delete{color:var(--danger)}
    .empty{background:#fff;border:1px dashed #cfd7e5;border-radius:14px;padding:30px 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.7}.footer-note{text-align:center;color:#9aa3b4;font-size:10px;margin-top:16px}
    .bottom-bar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:9px 12px calc(9px + env(safe-area-inset-bottom));z-index:20}.bottom-inner{max-width:560px;margin:0 auto;display:grid;grid-template-columns:minmax(0,1fr) 112px;gap:9px}.primary-bottom,.secondary-btn{height:46px;border-radius:11px;font-weight:800}.primary-bottom{border:0;background:#9db5ea;color:#fff}.primary-bottom:disabled{opacity:.45}.secondary-btn{border:1px solid #cfd7e5;background:#fff;color:#53627e}.secondary-btn:disabled{opacity:.45}
    .sheet-mask{position:fixed;inset:0;background:rgba(18,26,41,.38);display:none;align-items:flex-end;justify-content:center;z-index:50}.sheet-mask.show{display:flex}.sheet{width:100%;max-width:560px;background:#fff;border-radius:18px 18px 0 0;max-height:92vh;overflow:auto;padding:15px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -10px 30px rgba(0,0,0,.15)}
    .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.sheet-head h3{margin:0;font-size:17px}.close-btn{width:36px;height:36px;border:0;background:#f0f3f8;border-radius:50%;font-size:22px;color:#5a667c}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{min-width:0}.field.full{grid-column:1/-1}.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid #d9e0ea;border-radius:9px;background:#fff;padding:10px;font-size:14px;color:var(--text);outline:none}.field input,.field select{height:42px}.field textarea{min-height:84px;resize:vertical;line-height:1.45}.field input:focus,.field select:focus,.field textarea:focus{border-color:#7392d8;box-shadow:0 0 0 3px rgba(95,131,216,.12)}
    .save-btn{width:100%;height:46px;border:0;border-radius:11px;background:#416fcd;color:#fff;font-weight:800;margin-top:13px}
    @media(max-width:360px){.app{padding-left:9px;padding-right:9px}.mini-grid,.money-row{gap:5px}.mini{padding:9px 6px}.mini .v,.money-cell .amount{font-size:12px}.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.bottom-inner{grid-template-columns:minmax(0,1fr) 102px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"><h1>车队用车结算</h1><div class="sub">团队用车明细与累计待结算</div></header>

    <section class="select-panel">
      <div class="panel-label">选择团队</div>
      <div class="select-row">
        <select id="teamSelect" aria-label="选择团队"><option value="">请选择团队</option></select>
        <button class="add-team" id="addTeamBtn" type="button" aria-label="新增团队">＋</button>
      </div>
    </section>

    <section class="home-entry" id="homeEntry">
      <div class="smart-card" data-smart="home">
        <div class="smart-fields">
          <div class="smart-field"><div class="smart-label"><span class="required">*</span>日期</div><input id="homeDate" type="date"></div>
          <div class="smart-field"><div class="smart-label"><span class="required">*</span>车队</div><input id="homeChannel" type="text"></div>
          <div class="smart-field"><div class="smart-label"><span class="required">*</span>团队</div><select id="homeTeam"></select></div>
          <div class="smart-field"><div class="smart-label"><span class="required">*</span>办理事项</div><textarea id="homeItem"></textarea></div>
          <div class="smart-field"><div class="smart-label"><span class="required">*</span>费用</div><input id="homeFee" type="number" inputmode="decimal" min="0" step="0.01"></div>
        </div>
        <textarea class="paste-box" id="homePaste" aria-label="粘贴用车模板" placeholder="日期：年/月/日&#10;车队：&#10;团队：&#10;用车记录：&#10;费用："></textarea>
        <div class="smart-error" id="homeError"></div>
        <div class="smart-actions"><button class="upload-btn" id="homeUpload" type="button">上传</button></div>
      </div>
    </section>

    <section class="summary" id="summary">
      <div class="team-head">
        <div><h2 id="teamName"></h2><p id="teamCount"></p></div>
        <button class="history-btn" id="historyBtn" type="button">结算记录</button>
      </div>
      <div class="pending-box">
        <div class="pending-info"><div class="pending-label">累计待结算</div><div class="pending-amount" id="pendingAmount">RM 0.00</div></div>
        <button class="settle-all-btn" id="settleAllBtn" type="button">已结算</button>
      </div>
      <div id="pendingDetails">
        <div class="mini-grid">
          <div class="mini"><div class="k">车队成本</div><div class="v" id="totalCost">RM 0.00</div></div>
          <div class="mini"><div class="k">团队费用</div><div class="v" id="totalPrice">RM 0.00</div></div>
          <div class="mini"><div class="k">累计差价</div><div class="v" id="totalProfit">RM 0.00</div></div>
        </div>
        <div class="section-title"><h3>用车明细</h3><span id="recordMeta"></span></div>
        <div class="records" id="records"></div>
        <div class="footer-note">数据自动保存在本机浏览器</div>
      </div>
    </section>
  </main>

  <div class="bottom-bar"><div class="bottom-inner">
    <button class="primary-bottom" id="newRecordBtn" type="button" disabled>＋ 新增用车记录</button>
    <button class="secondary-btn" id="exportBtn" type="button">导出 XLSX</button>
  </div></div>

  <div class="sheet-mask" id="newMask" role="dialog" aria-modal="true">
    <div class="sheet">
      <div class="sheet-head"><h3>新增用车记录</h3><button class="close-btn" id="closeNewBtn" type="button" aria-label="关闭">×</button></div>
      <div class="smart-card" data-smart="new">
        <div class="smart-fields">
          <div class="smart-field"><div class="smart-label"><span class="required">*</span>日期</div><input id="newDate" type="date"></div>
          <div class="smart-field"><div class="smart-label"><span class="required">*</span>车队</div><input id="newChannel" type="text"></div>
          <div class="smart-field"><div class="smart-label"><span class="required">*</span>团队</div><select id="newTeam"></select></div>
          <div class="smart-field"><div class="smart-label"><span class="required">*</span>办理事项</div><textarea id="newItem"></textarea></div>
          <div class="smart-field"><div class="smart-label"><span class="required">*</span>费用</div><input id="newFee" type="number" inputmode="decimal" min="0" step="0.01"></div>
        </div>
        <textarea class="paste-box" id="newPaste" aria-label="粘贴用车模板" placeholder="日期：年/月/日&#10;车队：&#10;团队：&#10;用车记录：&#10;费用："></textarea>
        <div class="smart-error" id="newError"></div>
        <div class="smart-actions"><button class="upload-btn" id="newUpload" type="button">上传</button></div>
      </div>
    </div>
  </div>

  <div class="sheet-mask" id="editMask" role="dialog" aria-modal="true">
    <form class="sheet" id="editForm">
      <div class="sheet-head"><h3>编辑用车记录</h3><button class="close-btn" id="closeEditBtn" type="button" aria-label="关闭">×</button></div>
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div class="field full"><label for="editTeam">团队</label><select id="editTeam" required></select></div>
        <div class="field"><label for="editChannel">车队</label><input id="editChannel" type="text" required></div>
        <div class="field"><label for="editDate">日期</label><input id="editDate" type="date" required></div>
        <div class="field full"><label for="editItem">办理事项</label><input id="editItem" type="text" required></div>
        <div class="field"><label for="editCost">车队成本</label><input id="editCost" type="number" inputmode="decimal" min="0" step="0.01"></div>
        <div class="field"><label for="editPrice">团队费用</label><input id="editPrice" type="number" inputmode="decimal" min="0" step="0.01"></div>
        <div class="field full"><label for="editNote">详情</label><textarea id="editNote"></textarea></div>
        <div class="field full"><label for="editStatus">结算状态</label><select id="editStatus"><option value="未结算">未结算</option><option value="已结算">已结算</option></select></div>
      </div>
      <button class="save-btn" type="submit">保存记录</button>
    </form>
  </div>

  <div class="sheet-mask" id="historyMask" role="dialog" aria-modal="true">
    <div class="sheet">
      <div class="sheet-head"><h3 id="historyTitle">结算记录</h3><button class="close-btn" id="closeHistoryBtn" type="button" aria-label="关闭">×</button></div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>

    $("editForm").addEventListener("submit",e=>{e.preventDefault();const id=$("editId").value,idx=state.records.findIndex(x=>x.id===id);if(idx<0)return;const payload={id,team:$("editTeam").value,channel:$("editChannel").value.trim(),date:$("editDate").value,item:$("editItem").value.trim(),cost:Number($("editCost").value||0),price:Number($("editPrice").value||0),note:$("editNote").value.trim(),status:$("editStatus").value};ensureTeam(payload.team);state.records[idx]=payload;selectedTeam=payload.team;saveState();closeMask(editMask);render()});

    $("exportBtn").addEventListener("click",async()=>{const btn=$("exportBtn");btn.disabled=true;btn.textContent="处理中…";try{if(!window.XLSX)await loadXLSX();const rows=state.records.slice().sort((a,b)=>a.team.localeCompare(b.team,"zh-CN")||(b.date||"").localeCompare(a.date||"")).map(r=>({"团队":r.team,"车队":r.channel,"办理事项":r.item,"车队成本":Number(r.cost||0),"团队费用":Number(r.price||0),"差价":Number(r.price||0)-Number(r.cost||0),"结算状态":r.status,"日期":r.date,"详情":r.note||""}));const book=XLSX.utils.book_new();XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(rows),"全部记录");state.teams.forEach(team=>{const sub=rows.filter(r=>r["团队"]===team);if(!sub.length)return;const safe=team.replace(/[\\/?*[\]:]/g," ").slice(0,31)||"团队";XLSX.utils.book_append_sheet(book,XLSX.utils.json_to_sheet(sub),safe)});XLSX.writeFile(book,`车队用车结算_${new Date().toISOString().slice(0,10)}.xlsx`)}catch(err){alert("导出失败，请确认手机已经联网后再试。") }finally{btn.disabled=false;btn.textContent="导出 XLSX"}});
    function loadXLSX(){return new Promise((resolve,reject)=>{const s=document.createElement("script");s.src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js";s.onload=resolve;s.onerror=reject;document.head.appendChild(s)})}

    wireSmart("home");wireSmart("new");fillTeamOptions();$("homeDate").value=todayISO();render();
  </script>
</body>
</html>
