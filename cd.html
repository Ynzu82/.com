  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="车队">

  <meta name="theme-color" content="#f5f7fb">
  <title>Fang车队详情</title>
  <style>
    :root{
      --bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#7c879e;--line:#e5eaf2;
      --blue:#4f75d6;--blue-soft:#eef3ff;--green:#29a85a;--green-bg:#eefaf2;
      --yellow:#fff1a8;--yellow-card:#fffdf2;--danger:#d94b4b;--shadow:0 2px 10px rgba(28,45,79,.06)
    }
    *{box-sizing:border-box;max-width:100%}
    html,body{margin:0;width:100%;max-width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;-webkit-text-size-adjust:100%;text-size-adjust:100%;touch-action:pan-y;overscroll-behavior-x:none}
    body{overflow-x:hidden;position:relative}
    button,input,select,textarea{font-family:inherit;font-size:16px}
    button{touch-action:manipulation}
    .app{width:100%;max-width:560px;margin:0 auto;padding:14px 12px calc(92px + env(safe-area-inset-bottom))}
    .topbar{padding:4px 2px 12px}
    .topbar h1{font-size:20px;line-height:1.25;margin:0;font-weight:800}
    .topbar .sub{font-size:11px;color:var(--muted);margin-top:3px}
    .select-panel,.paste-card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
    .select-panel{padding:12px}
    .panel-label{font-size:12px;color:var(--muted);margin-bottom:7px}
    .select-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    #teamSelect{width:100%;height:44px;border:2px solid #171717;border-radius:7px;background:#fff;padding:0 36px 0 11px;font-size:16px;color:var(--text);outline:none}
    .add-team{width:100%;height:44px;border:0;border-radius:9px;background:var(--blue-soft);color:#416cc7;font-size:14px;font-weight:800;line-height:1;padding:0 10px;white-space:nowrap}

    .paste-card{padding:10px}
    .compact-paste{width:100%;height:88px;min-height:88px;border:1px solid #d7dde8;border-radius:9px;background:#fff;padding:10px;font-size:16px;line-height:1.45;resize:none;outline:none}
    .compact-paste:focus{border-color:#7392d8;box-shadow:0 0 0 3px rgba(95,131,216,.10)}
    .parse-error{display:none;margin-top:6px;font-size:12px;color:#b33d3d;line-height:1.45}
    .parse-error.show{display:block}

    .team-overview{display:grid;gap:8px;margin-top:12px}
    .team-overview-card{display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:50px;padding:12px 14px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);font-size:15px;font-weight:750;color:#172033;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:pan-y;cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,opacity .16s ease}
    .team-overview-card strong{font-size:16px;color:var(--green);white-space:nowrap}
    .team-overview.reordering .team-overview-card{animation:overviewWiggle .18s ease-in-out infinite alternate;touch-action:none}
    .team-overview-card.dragging{opacity:.9;transform:scale(1.025);box-shadow:0 12px 28px rgba(28,45,79,.20);z-index:3;animation:none!important}
    @keyframes overviewWiggle{from{transform:rotate(-.35deg)}to{transform:rotate(.35deg)}}

    .summary{margin-top:12px;display:none}.summary.show{display:block}
    .team-head{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:auto auto;gap:8px;padding:2px 0 10px}
    .team-identity{grid-row:1/3;display:flex;align-items:center;justify-content:center;min-height:94px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;box-shadow:var(--shadow);min-width:0;text-align:center;cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:manipulation;transition:transform .12s ease,background .12s ease,box-shadow .12s ease}.team-identity.longpress-active{transform:scale(.985);background:#f6f8fc;box-shadow:0 1px 5px rgba(28,45,79,.10)}
    .team-title-line{display:flex;align-items:center;justify-content:center;width:100%;min-width:0}
    .team-head h2{font-size:18px;margin:0;overflow-wrap:anywhere;text-align:center;cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:manipulation}
    .history-btn{grid-column:2;width:100%;height:39px;border:1px solid #cfd7e5;border-radius:9px;background:#fff;color:#53627e;font-size:13px;font-weight:800;padding:0 10px;white-space:nowrap}
    .pending-box{grid-column:2;width:100%;min-width:0;max-width:none;background:var(--green-bg);border:1px solid #d7f2e0;border-radius:12px;padding:9px 11px;box-shadow:var(--shadow)}
    .pending-label{font-size:11px;color:#5b8068}
    .pending-amount{font-size:23px;line-height:1.15;font-weight:800;color:var(--green);margin-top:2px;overflow-wrap:anywhere}
    #pendingDetails{margin-top:10px}
    .records,.history-list{display:grid;gap:9px}
    .record-card{border:1px solid var(--line);border-radius:13px;background:var(--card);box-shadow:var(--shadow);padding:12px;min-width:0}
    .record-card.pending{background:var(--yellow-card);border-color:#f2df84}
    .record-top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:start}
    .record-name{font-size:14px;font-weight:780;color:#111827;line-height:1.4;overflow-wrap:anywhere}
    .record-date-inline{font-size:12px;color:#111827;font-weight:600;margin-left:6px;white-space:nowrap}
    .status-select{height:31px;border-radius:8px;padding:0 25px 0 9px;font-size:12px;font-weight:700;outline:none}
    .status-select.pending{background:var(--yellow);border:1px solid #e8cb39;color:#6e5a00}
    .status-select.settled{background:#fff;border:1px solid #dfe4ed;color:#526073}
    .money-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-top:10px}
    .money-cell{border-radius:9px;background:rgba(255,255,255,.72);border:1px solid #edf0f5;padding:8px 7px;min-width:0}
    .money-cell .label{font-size:10px;color:var(--muted)}
    .money-cell .amount{font-size:13px;font-weight:800;margin-top:3px;overflow-wrap:anywhere}
    .money-cell.price .amount{color:var(--green)}
    .money-cell.profit .amount.negative{color:var(--danger)}
    .detail{margin-top:9px;background:transparent;border-radius:0;padding:8px 0 0;border-top:1px dashed rgba(160,140,55,.28)}
    .detail-label{font-size:10px;color:var(--muted);margin-bottom:4px}
    .detail-text{font-size:12px;line-height:1.55;white-space:pre-wrap;overflow-wrap:anywhere}
    .record-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:9px}
    .text-btn{border:0;background:transparent;padding:5px 4px;font-size:12px;color:#60708c}
    .text-btn.delete{color:var(--danger)}
    .text-btn.restore{color:#238447;font-weight:800}
    .empty{background:#fff;border:1px dashed #cfd7e5;border-radius:14px;padding:30px 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.7}
    .footer-note{text-align:center;color:#9aa3b4;font-size:10px;margin-top:16px}

    .bottom-bar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:9px 12px calc(9px + env(safe-area-inset-bottom));z-index:20}
    .bottom-inner{max-width:560px;margin:0 auto;display:grid;grid-template-columns:minmax(0,1fr) 112px;gap:9px}
    .primary-bottom,.secondary-btn{height:46px;border-radius:11px;font-weight:800}
    .primary-bottom{border:0;background:#9db5ea;color:#fff}
    .primary-bottom:disabled{opacity:.45}
    .secondary-btn{border:1px solid #cfd7e5;background:#fff;color:#53627e}
    .secondary-btn:disabled{opacity:.45}

    .sheet-mask{position:fixed;inset:0;width:100%;max-width:100%;overflow:hidden;background:rgba(18,26,41,.38);display:none;align-items:flex-end;justify-content:center;z-index:50;padding:0}
    .sheet-mask.show{display:flex}
    .sheet{width:100%;max-width:560px;min-width:0;background:#fff;border-radius:18px 18px 0 0;max-height:92vh;overflow-y:auto;overflow-x:hidden;overscroll-behavior-x:none;padding:15px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -10px 30px rgba(0,0,0,.15)}
    .sheet-mask.centered{align-items:center;padding:16px}
    .sheet-mask.centered .sheet{border-radius:18px;max-height:86vh;padding:15px 14px 18px;box-shadow:0 16px 45px rgba(0,0,0,.22)}
    .sheet-mask.review-mask{z-index:80}
    .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .sheet-head h3{margin:0;font-size:17px}
    .close-btn{width:36px;height:36px;border:0;background:#f0f3f8;border-radius:50%;font-size:22px;color:#5a667c}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;align-items:start}
    .field{min-width:0}.field.full{grid-column:1/-1}
    .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px}
    .field input,.field select,.field textarea{width:100%;min-width:0;max-width:100%;border:1px solid #d9e0ea;border-radius:9px;background:#fff;padding:10px;font-size:16px;color:var(--text);outline:none}
    .field input,.field select{display:block;height:50px!important;min-height:50px!important;max-height:50px!important;line-height:normal;padding:0 12px!important}
    .field textarea{height:160px;min-height:160px;max-height:240px;overflow-y:auto!important;overflow-x:hidden;resize:none;line-height:1.45;white-space:pre-wrap;overflow-wrap:anywhere;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y}
    .field input[type="date"]{width:100%;min-width:0;-webkit-appearance:none;appearance:none;padding:0 9px!important;font-size:16px;letter-spacing:-.15px}
    .field input[type="date"]::-webkit-date-and-time-value{display:flex;align-items:center;width:100%;height:48px;min-height:48px;margin:0;padding:0;text-align:left;line-height:normal}
    .field input[type="date"]::-webkit-calendar-picker-indicator{margin:0;padding:0}
    .field select{-webkit-appearance:auto;appearance:auto}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:#7392d8;box-shadow:0 0 0 3px rgba(95,131,216,.12)}
    .field input[readonly],.field textarea[readonly]{background:#f6f8fb;color:#273248;border-color:#e1e6ef;box-shadow:none}
    .field input[readonly]:focus,.field textarea[readonly]:focus{border-color:#e1e6ef;box-shadow:none}
    .save-btn{width:100%;height:46px;border:0;border-radius:11px;background:#416fcd;color:#fff;font-weight:800;margin-top:13px}
    .review-grid{grid-template-columns:1fr}.review-actions{display:grid;grid-template-columns:92px minmax(0,1fr);gap:9px;margin-top:13px}
    .cancel-btn{height:44px;border:1px solid #d6dce7;border-radius:10px;background:#fff;color:#63708a;font-weight:800}
    .confirm-btn{height:44px;border:0;border-radius:10px;background:#ff5a00;color:#fff;font-weight:800}
    .review-error{display:none;margin-top:8px;font-size:12px;color:#b33d3d}.review-error.show{display:block}
    .new-team-note{font-size:11px;color:var(--muted);margin:0 0 8px}
    .print-area{display:none}

    @media(max-width:360px){
      .app{padding-left:9px;padding-right:9px}.money-row{gap:5px}.money-cell .amount{font-size:12px}
      .bottom-inner{grid-template-columns:minmax(0,1fr) 102px}
    }
    @media print{
      @page{size:A4 portrait;margin:8mm 11mm}
      html,body{width:auto!important;min-height:0!important;background:#fff!important;color:#111!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      body>*:not(.print-area){display:none!important}
      .print-area{display:block!important;width:170mm!important;max-width:170mm!important;margin:0 auto!important;padding:0!important;font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .print-header{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;border-bottom:1.2px solid #cfd5df;padding-bottom:5px;margin-bottom:6px}
      .print-title{font-size:18px;font-weight:800;line-height:1.2;margin:0;min-width:0}
      .print-total-inline{flex:0 0 auto;text-align:right;white-space:nowrap}
      .print-total-inline span{font-size:9px;color:#5b8068;margin-right:5px}
      .print-total-inline strong{font-size:16px;line-height:1.1;color:#238447}
      .print-record{border:1px solid #d9dee8;border-radius:7px;padding:6px 8px;margin-bottom:5px;break-inside:avoid;page-break-inside:avoid}
      .print-record-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;font-size:10.5px;font-weight:800;line-height:1.3;margin:0}
      .print-record-title{min-width:0;overflow-wrap:anywhere}
      .print-record-amount{flex:0 0 auto;font-size:11px;font-weight:800;white-space:nowrap}
      .print-content{border-top:1px dashed #d9dee8;padding-top:4px;margin-top:4px;font-size:9.5px;line-height:1.32;white-space:pre-wrap;overflow-wrap:anywhere}
      .print-footer{font-size:7.5px;color:#8c95a5;text-align:right;margin-top:5px}
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"><h1>Fang车队详情</h1><div class="sub">团队用车明细与累计待结算</div></header>

    <section class="select-panel">
      <div class="select-row">
        <select id="teamSelect" aria-label="选择团队"><option value="">请选择团队</option></select>
        <button class="add-team" id="addTeamBtn" type="button" aria-label="添加团队">添加团队</button>
      </div>
    </section>

    <section class="team-overview" id="teamOverview" aria-label="团队待结算列表"></section>

    <section class="summary" id="summary">
      <div class="team-head">
        <div class="team-identity">
          <div class="team-title-line"><h2 id="teamName" title="长按修改团队名称" aria-label="长按修改团队名称"></h2></div>
        </div>
        <div class="pending-box">
          <div class="pending-label">累计待结算</div>
          <div class="pending-amount" id="pendingAmount">RM 0.00</div>
        </div>
        <button class="history-btn" id="historyBtn" type="button">结算记录</button>
      </div>
      <div id="pendingDetails">
        <div class="records" id="records"></div>
        <div class="footer-note">数据自动保存在本机浏览器</div>
      </div>
    </section>
  </main>

  <div class="bottom-bar" id="bottomBar"><div class="bottom-inner">
    <button class="primary-bottom" id="newRecordBtn" type="button" disabled>＋ 新增用车记录</button>
    <button class="secondary-btn" id="exportBtn" type="button" disabled>导出 PDF</button>
  </div></div>

  <div class="sheet-mask centered" id="newMask" role="dialog" aria-modal="true">
    <form class="sheet" id="newForm">
      <div class="sheet-head"><h3>新增用车记录</h3><button class="close-btn" id="closeNewBtn" type="button" aria-label="关闭">×</button></div>
      <div class="form-grid">
        <div class="field"><label for="newDate">日期</label><input id="newDate" type="date" required></div>
        <div class="field"><label for="newStatus">结算状态</label><select id="newStatus"><option value="未结算">未结算</option><option value="已结算">已结算</option></select></div>
        <div class="field"><label for="newChannel">车队</label><input id="newChannel" type="text"></div>
        <div class="field"><label for="newTeam">团队</label><select id="newTeam" required></select></div>
        <div class="field"><label for="newCost">车队价格</label><input id="newCost" type="number" inputmode="decimal" min="0" step="0.01"></div>
        <div class="field"><label for="newPrice">团队价格</label><input id="newPrice" type="number" inputmode="decimal" min="0" step="0.01"></div>
        <div class="field full"><label for="newDetail">详情</label><textarea id="newDetail" required></textarea></div>
      </div>
      <button class="save-btn" type="submit">保存记录</button>
    </form>
  </div>

  <div class="sheet-mask centered review-mask" id="reviewMask" role="dialog" aria-modal="true">
    <form class="sheet" id="reviewForm">
      <div class="sheet-head"><h3>上传用车记录</h3><button class="close-btn" id="closeReviewBtn" type="button" aria-label="关闭">×</button></div>
      <div class="form-grid review-grid">
        <div class="field full"><label for="reviewDate">日期（自动识别）</label><input id="reviewDate" type="date" readonly></div>
        <div class="field full"><label for="reviewChannel">车队（自动识别）</label><input id="reviewChannel" type="text" readonly></div>
        <div class="field full"><label for="reviewTeam">团队（自动识别）</label><input id="reviewTeam" type="text" readonly><datalist id="teamDatalist"></datalist></div>
        <div class="field full"><label for="reviewDetail">用车详情（自动识别）</label><textarea id="reviewDetail" readonly></textarea></div>
        <div class="field full"><label for="reviewCost">车队费用（自动识别）</label><input id="reviewCost" type="number" inputmode="decimal" min="0" step="0.01" readonly></div>
        <div class="field full"><label for="reviewPrice">团队费用</label><input id="reviewPrice" type="number" inputmode="decimal" min="0" step="0.01"></div>
      </div>
      <div class="review-error" id="reviewError"></div>
      <div class="review-actions"><button class="cancel-btn" id="cancelReviewBtn" type="button">取消</button><button class="confirm-btn" type="submit">上传</button></div>
    </form>
  </div>

  <div class="sheet-mask centered" id="editMask" role="dialog" aria-modal="true">
    <form class="sheet" id="editForm">
      <div class="sheet-head"><h3>编辑用车记录</h3><button class="close-btn" id="closeEditBtn" type="button" aria-label="关闭">×</button></div>
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div class="field"><label for="editDate">日期</label><input id="editDate" type="date" required></div>
        <div class="field"><label for="editStatus">结算状态</label><select id="editStatus"><option value="未结算">未结算</option><option value="已结算">已结算</option></select></div>
        <div class="field"><label for="editChannel">车队</label><input id="editChannel" type="text"></div>
        <div class="field"><label for="editTeam">团队</label><select id="editTeam" required></select></div>
        <div class="field"><label for="editCost">车队价格</label><input id="editCost" type="number" inputmode="decimal" min="0" step="0.01"></div>
        <div class="field"><label for="editPrice">团队价格</label><input id="editPrice" type="number" inputmode="decimal" min="0" step="0.01"></div>
        <div class="field full"><label for="editDetail">详情</label><textarea id="editDetail" required></textarea></div>
      </div>
      <button class="save-btn" type="submit">保存记录</button>
    </form>
  </div>

  <div class="sheet-mask centered" id="historyMask" role="dialog" aria-modal="true">
    <div class="sheet history-sheet">
      <div class="sheet-head"><h3 id="historyTitle">结算记录</h3><button class="close-btn" id="closeHistoryBtn" type="button" aria-label="关闭">×</button></div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <section class="print-area" id="printArea" aria-hidden="true"></section>

      const m=String(v).match(/(\d{4})[-\/.年](\d{1,2})[-\/.月](\d{1,2})/);

    function normalizeDateInput(v){
      const m=String(v||"").trim().match(/(\d{4})\s*[\/\-.年]\s*(\d{1,2})\s*[\/\-.月]\s*(\d{1,2})/);
      if(!m)return "";const y=+m[1],mo=+m[2],da=+m[3],d=new Date(y,mo-1,da);
      if(d.getFullYear()!==y||d.getMonth()!==mo-1||d.getDate()!==da)return "";
      return `${y}-${String(mo).padStart(2,"0")}-${String(da).padStart(2,"0")}`
    }
    function parseFee(v){const m=String(v||"").replace(/,/g,"").match(/-?\d+(?:\.\d+)?/);return m?Number(m[0]):NaN}
    function parseTemplate(text){
      const raw=String(text||"").replace(/\r\n?/g,"\n").replace(/\u00a0/g," ");
      const lines=raw.split("\n").map(x=>x.trimEnd());
      const labelPattern=/^\s*(日期|车队|渠道|团队|用车详情|用车记录|办理事项|费用|车队费用)\s*[:：]?\s*(.*)$/;
      const entries=[];
      lines.forEach((line,index)=>{
        const m=line.match(labelPattern);
        if(m)entries.push({index,label:m[1],tail:(m[2]||"").trim()});
      });
      const aliases={
        date:["日期"],channel:["车队","渠道"],team:["团队"],
        item:["用车详情","用车记录","办理事项"],fee:["费用","车队费用"]
      };
      const nextEntryIndex=index=>{
        const next=entries.find(e=>e.index>index);
        return next?next.index:lines.length;
      };
      const readField=(names,multiline=false)=>{
        const e=entries.find(x=>names.includes(x.label));
        if(!e)return "";
        const collected=[];
        if(e.tail)collected.push(e.tail);
        const stop=nextEntryIndex(e.index);
        for(let i=e.index+1;i<stop;i++){
          const value=lines[i].trim();
          if(value)collected.push(value);
        }
        if(multiline)return collected.join("\n").trim();
        return (collected[0]||"").trim();
      };

      let dateRaw=readField(aliases.date);
      let channel=readField(aliases.channel);
      let team=readField(aliases.team);
      let item=readField(aliases.item,true);
      let feeRaw=readField(aliases.fee);

      // 容错：即使没有冒号或标签识别失败，也按用户固定顺序尝试读取。
      if(entries.length===0){
        const values=lines.map(x=>x.trim()).filter(Boolean);
        dateRaw=values[0]||"";
        channel=values[1]||"";
        team=values[2]||"";
        feeRaw=values.length>4?values[values.length-1]:"";
        item=values.length>4?values.slice(3,-1).join("\n"):(values[3]||"");
      }

      return {
        date:normalizeDateInput(dateRaw),
        channel:channel.trim(),
        team:team.trim(),
        item:item.trim(),
        fee:parseFee(feeRaw)
      }
    }

    }

      return cleanDetailText(item+"\n"+note)

    function openNew(){
      $("newDate").value=todayISO();
      $("newStatus").value="未结算";
      $("newChannel").value="";
      $("newTeam").value=selectedTeam||"";
      $("newCost").value="";
      $("newPrice").value="";
      $("newDetail").value="";
      autoResizeTextarea($("newDetail"));
      openMask(newMask)
    }
    function openEdit(id){
      const r=state.records.find(x=>x.id===id);if(!r)return;
      $("editId").value=id;$("editDate").value=normalizeDateInput(r.date)||"";$("editStatus").value=r.status||"未结算";
      $("editChannel").value=r.channel||"";$("editTeam").value=r.team;$("editCost").value=r.cost??"";$("editPrice").value=r.price??"";
      $("editDetail").value=getDetail(r);autoResizeTextarea($("editDetail"));
      openMask(editMask)
    }
    function openHistory(){
      const list=state.records.filter(r=>r.team===selectedTeam&&r.status==="已结算").sort((a,b)=>(b.date||"").localeCompare(a.date||""));
      $("historyTitle").textContent=`${selectedTeam} · 结算记录`;
      $("historyList").innerHTML=list.length?list.map(settledCard).join(""):'<div class="empty">暂无已结算记录</div>';
      openMask(historyMask)
    }
    function closeReview(resetTrigger=true){
      const prefix=pendingUpload?.prefix;
      if(resetTrigger&&prefix)lastTriggered[prefix]="";
      pendingUpload=null;closeMask(reviewMask)
    }

    teamOverview.addEventListener("pointerdown",e=>{
      const card=e.target.closest(".team-overview-card");if(!card)return;
      clearReorderTimer();reorderState.startX=e.clientX;reorderState.startY=e.clientY;
      reorderState.timer=setTimeout(()=>beginTeamReorder(card,e.pointerId),480)
    });
    teamOverview.addEventListener("pointermove",e=>{
      if(!reorderState.active){
        if(Math.hypot(e.clientX-reorderState.startX,e.clientY-reorderState.startY)>9)clearReorderTimer();
        return
      }
      e.preventDefault();
      const target=document.elementFromPoint(e.clientX,e.clientY)?.closest(".team-overview-card");
      if(!target||target===reorderState.active||!teamOverview.contains(target))return;
      const rect=target.getBoundingClientRect();
      teamOverview.insertBefore(reorderState.active,e.clientY<rect.top+rect.height/2?target:target.nextSibling)
    },{passive:false});
    teamOverview.addEventListener("pointerup",finishTeamReorder);
    teamOverview.addEventListener("pointercancel",finishTeamReorder);
    teamOverview.addEventListener("pointerleave",e=>{if(!reorderState.active)clearReorderTimer()});
    teamOverview.addEventListener("contextmenu",e=>{if(e.target.closest(".team-overview-card"))e.preventDefault()});
    teamOverview.addEventListener("click",e=>{
      const card=e.target.closest(".team-overview-card");if(!card||reorderState.suppressClick)return;
      selectedTeam=card.dataset.team;render();window.scrollTo(0,0)
    });
    teamOverview.addEventListener("keydown",e=>{
      const card=e.target.closest(".team-overview-card");if(!card||!(e.key==="Enter"||e.key===" "))return;
      e.preventDefault();selectedTeam=card.dataset.team;render();window.scrollTo(0,0)
    });

    teamSelect.addEventListener("change",()=>{selectedTeam=teamSelect.value;render();window.scrollTo(0,0)});
    $("addTeamBtn").addEventListener("click",()=>{
      const name=prompt("请输入新团队名称");if(!name)return;const clean=name.trim();if(!clean)return;
      ensureTeam(clean);saveState();selectedTeam=clean;render()
    });
    function renameSelectedTeam(){
      if(!selectedTeam)return;
      const oldName=selectedTeam;const input=prompt("修改团队名称",oldName);if(input===null)return;
      const newName=input.trim();if(!newName||newName===oldName)return;
      state.records.forEach(r=>{if(r.team===oldName)r.team=newName});
      state.teams=state.teams.filter(t=>t!==oldName);
      ensureTeam(newName);selectedTeam=newName;saveState();render()
    }
    const teamNameEl=$("teamName");
    const teamIdentityEl=document.querySelector(".team-identity");
    let teamNamePressTimer=null,teamNameStartX=0,teamNameStartY=0,teamNameLongPressed=false;
    function clearTeamNamePress(){
      if(teamNamePressTimer){clearTimeout(teamNamePressTimer);teamNamePressTimer=null}
      teamIdentityEl.classList.remove("longpress-active")
    }
    function startTeamNamePress(x,y){
      if(!selectedTeam)return;
      clearTeamNamePress();
      teamNameStartX=x;teamNameStartY=y;teamNameLongPressed=false;
      teamIdentityEl.classList.add("longpress-active");
      teamNamePressTimer=setTimeout(()=>{
        teamNamePressTimer=null;
        teamNameLongPressed=true;
        teamIdentityEl.classList.remove("longpress-active");
        if(navigator.vibrate)navigator.vibrate(20);
        renameSelectedTeam()
      },550)
    }
    teamIdentityEl.addEventListener("pointerdown",e=>startTeamNamePress(e.clientX,e.clientY));
    teamIdentityEl.addEventListener("pointermove",e=>{
      if(Math.hypot(e.clientX-teamNameStartX,e.clientY-teamNameStartY)>10)clearTeamNamePress()
    });
    ["pointerup","pointercancel","pointerleave"].forEach(type=>teamIdentityEl.addEventListener(type,clearTeamNamePress));
    teamIdentityEl.addEventListener("contextmenu",e=>e.preventDefault());
    teamIdentityEl.addEventListener("click",e=>{
      if(teamNameLongPressed){e.preventDefault();e.stopPropagation();teamNameLongPressed=false}
    });
    newRecordBtn.addEventListener("click",openNew);
    $("historyBtn").addEventListener("click",openHistory);
    $("closeNewBtn").addEventListener("click",()=>closeMask(newMask));
    $("closeEditBtn").addEventListener("click",()=>closeMask(editMask));
    $("closeHistoryBtn").addEventListener("click",()=>closeMask(historyMask));
    $("closeReviewBtn").addEventListener("click",()=>closeReview(true));
    $("cancelReviewBtn").addEventListener("click",()=>closeReview(true));
    [newMask,editMask,historyMask].forEach(mask=>mask.addEventListener("click",e=>{if(e.target===mask)closeMask(mask)}));
    reviewMask.addEventListener("click",e=>{if(e.target===reviewMask)closeReview(true)});

    $("newForm").addEventListener("submit",e=>{
      e.preventDefault();
      const team=$("newTeam").value.trim();if(!team)return;
      const payload={
        id:newId(),team,channel:$("newChannel").value.trim(),date:$("newDate").value,
        item:$("newDetail").value.trim(),cost:Number($("newCost").value||0),price:Number($("newPrice").value||0),
        note:"",status:$("newStatus").value
      };
      ensureTeam(payload.team);state.records.push(payload);selectedTeam=payload.team;saveState();closeMask(newMask);render();window.scrollTo(0,0)
    });

    $("reviewForm").addEventListener("submit",e=>{
      e.preventDefault();if(!pendingUpload)return;
      const costValue=Number($("reviewCost").value),priceValue=Number($("reviewPrice").value);
      const payload={
        date:$("reviewDate").value||"",channel:$("reviewChannel").value.trim(),
        team:$("reviewTeam").value.trim()||selectedTeam||"未分类",
        item:$("reviewDetail").value.trim(),
        cost:Number.isFinite(costValue)&&costValue>=0?costValue:0,
        price:Number.isFinite(priceValue)&&priceValue>=0?priceValue:0
      };
      const prefix=pendingUpload.prefix;
      ensureTeam(payload.team);
      state.records.push({id:newId(),team:payload.team,channel:payload.channel,date:payload.date,item:payload.item,cost:payload.cost,price:payload.price,note:"",status:"未结算"});
      saveState();selectedTeam=payload.team;
      $(prefix+"Paste").value="";lastTriggered[prefix]="";clearParseError(prefix);
      closeReview(false);if(prefix==="new")closeMask(newMask);render();window.scrollTo(0,0)
    });

    recordsEl.addEventListener("change",e=>{
      const el=e.target.closest('[data-action="status"]');if(!el)return;
      const r=state.records.find(x=>x.id===el.dataset.id);if(!r)return;
      if(el.value==="已结算"&&!confirm("确认这条记录已经结算吗？")){el.value="未结算";return}
      r.status=el.value;saveState();render()
    });
    recordsEl.addEventListener("click",e=>{
      const btn=e.target.closest("[data-action]");if(!btn||btn.dataset.action==="status")return;
      const id=btn.dataset.id;
      if(btn.dataset.action==="edit")openEdit(id);
      if(btn.dataset.action==="delete"&&confirm("确定删除这条用车记录吗？")){state.records=state.records.filter(x=>x.id!==id);saveState();render()}
    });
    $("historyList").addEventListener("click",e=>{
      const btn=e.target.closest('[data-action="restore"]');if(!btn)return;
      const r=state.records.find(x=>x.id===btn.dataset.id);if(!r)return;
      if(!confirm("确认把这条记录恢复为未结算吗？"))return;
      r.status="未结算";saveState();openHistory();render()
    });
    $("editForm").addEventListener("submit",e=>{
      e.preventDefault();const id=$("editId").value,idx=state.records.findIndex(x=>x.id===id);if(idx<0)return;
      const payload={id,team:$("editTeam").value,channel:$("editChannel").value.trim(),date:$("editDate").value,item:$("editDetail").value.trim(),cost:Number($("editCost").value||0),price:Number($("editPrice").value||0),note:"",status:$("editStatus").value};
      ensureTeam(payload.team);state.records[idx]=payload;selectedTeam=payload.team;saveState();closeMask(editMask);render()
    });

    exportBtn.addEventListener("click",()=>{
      if(!selectedTeam){alert("请先选择团队");return}
      const list=state.records.filter(r=>r.team===selectedTeam&&r.status!=="已结算").sort((a,b)=>(b.date||"").localeCompare(a.date||""));
      if(!list.length){alert("当前团队没有待结算记录");return}
      const total=list.reduce((s,r)=>s+Number(r.price||0),0);
      const cards=list.map(r=>{
        const detail=getDetail(r);
        return `<article class="print-record"><div class="print-record-head"><div class="print-record-title">${escapeHtml(displayTitle(r))} ${escapeHtml(formatDate(r.date))}</div><div class="print-record-amount">${money(r.price)}</div></div>${detail?`<div class="print-content">${escapeHtml(detail)}</div>`:""}</article>`
      }).join("");
      $("printArea").innerHTML=`<div class="print-header"><h1 class="print-title">${escapeHtml(selectedTeam)} 用车结算</h1><div class="print-total-inline"><span>累计待结算</span><strong>${money(total)}</strong></div></div>${cards}<div class="print-footer">生成日期：${escapeHtml(formatDate(todayISO()))}</div>`;
      window.print()
    });

    ["newDetail","editDetail"].forEach(id=>$(id).addEventListener("input",e=>autoResizeTextarea(e.target)));
    ["gesturestart","gesturechange","gestureend"].forEach(type=>document.addEventListener(type,e=>e.preventDefault(),{passive:false}));
    document.addEventListener("dblclick",e=>e.preventDefault(),{passive:false});
    document.addEventListener("wheel",e=>{if(e.ctrlKey)e.preventDefault()},{passive:false});
    document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&["+","-","=","0"].includes(e.key))e.preventDefault()});
    fillTeamOptions();render();
  </script>
</body>
</html>
